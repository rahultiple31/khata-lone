name: Build Web PWA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Ready-to-Deploy App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Test React source
        run: npm test

      - name: Build React web app
        run: |
          npm run build
          touch dist/.nojekyll

      - name: Check required app files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "dist/index.html"
            "dist/manifest.webmanifest"
            "dist/sw.js"
            "dist/icon.svg"
            "dist/assets/icons/icon-192.png"
            "dist/assets/icons/icon-512.png"
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "::error file=$file::Required web PWA file is missing"
              exit 1
            }
          done

      - name: Validate web PWA metadata
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'rel="manifest"' dist/index.html || {
            echo "::error file=dist/index.html::index.html must link the web app manifest"
            exit 1
          }

          grep -q 'serviceWorker.register' src/App.jsx || {
            echo "::error file=src/App.jsx::React app must register the service worker"
            exit 1
          }

          node <<'NODE'
          const fs = require('fs');

          const manifest = JSON.parse(fs.readFileSync('dist/manifest.webmanifest', 'utf8'));
          const requiredManifestFields = [
            'name',
            'short_name',
            'start_url',
            'scope',
            'display',
            'background_color',
            'theme_color',
            'icons'
          ];

          for (const field of requiredManifestFields) {
            if (!manifest[field]) {
              console.error(`::error file=manifest.webmanifest::Missing manifest field: ${field}`);
              process.exit(1);
            }
          }

          if (manifest.display !== 'standalone') {
            console.error('::error file=manifest.webmanifest::PWA installability expects display to be standalone');
            process.exit(1);
          }

          const icons = Array.isArray(manifest.icons) ? manifest.icons : [];
          for (const size of ['192x192', '512x512']) {
            const icon = icons.find(item => item.sizes === size && item.type === 'image/png');
            if (!icon) {
              console.error(`::error file=manifest.webmanifest::Missing PNG icon size ${size}`);
              process.exit(1);
            }

            if (!fs.existsSync(`dist/${icon.src}`)) {
              console.error(`::error file=manifest.webmanifest::Manifest icon file does not exist: ${icon.src}`);
              process.exit(1);
            }
          }

          const serviceWorker = fs.readFileSync('dist/sw.js', 'utf8');
          for (const asset of [
            'index.html',
            'manifest.webmanifest',
            'icon.svg',
            'assets/icons/icon-192.png',
            'assets/icons/icon-512.png'
          ]) {
            if (!serviceWorker.includes(asset)) {
              console.error(`::error file=sw.js::Service worker cache list should include ${asset}`);
              process.exit(1);
            }
          }
          NODE

      - name: Upload ready app artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisably-web-pwa
          path: dist
          if-no-files-found: error
