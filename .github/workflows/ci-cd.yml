name: Build Android PWA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Ready-to-Deploy App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required app files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "index.html"
            "styles.css"
            "app.js"
            "manifest.webmanifest"
            "sw.js"
            "icon.svg"
            "assets/icons/icon-192.png"
            "assets/icons/icon-512.png"
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "::error file=$file::Required Android PWA file is missing"
              exit 1
            }
          done

      - name: Validate Android PWA metadata
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'rel="manifest"' index.html || {
            echo "::error file=index.html::index.html must link the web app manifest"
            exit 1
          }

          grep -q 'navigator.serviceWorker.register' app.js || {
            echo "::error file=app.js::app.js must register the service worker"
            exit 1
          }

          node <<'NODE'
          const fs = require('fs');

          const manifest = JSON.parse(fs.readFileSync('manifest.webmanifest', 'utf8'));
          const requiredManifestFields = [
            'name',
            'short_name',
            'start_url',
            'scope',
            'display',
            'background_color',
            'theme_color',
            'icons'
          ];

          for (const field of requiredManifestFields) {
            if (!manifest[field]) {
              console.error(`::error file=manifest.webmanifest::Missing manifest field: ${field}`);
              process.exit(1);
            }
          }

          if (manifest.display !== 'standalone') {
            console.error('::error file=manifest.webmanifest::Android installability expects display to be standalone');
            process.exit(1);
          }

          const icons = Array.isArray(manifest.icons) ? manifest.icons : [];
          for (const size of ['192x192', '512x512']) {
            const icon = icons.find(item => item.sizes === size && item.type === 'image/png');
            if (!icon) {
              console.error(`::error file=manifest.webmanifest::Missing PNG icon size ${size}`);
              process.exit(1);
            }

            if (!fs.existsSync(icon.src)) {
              console.error(`::error file=manifest.webmanifest::Manifest icon file does not exist: ${icon.src}`);
              process.exit(1);
            }
          }

          const serviceWorker = fs.readFileSync('sw.js', 'utf8');
          for (const asset of [
            'index.html',
            'styles.css',
            'app.js',
            'manifest.webmanifest',
            'icon.svg',
            'assets/icons/icon-192.png',
            'assets/icons/icon-512.png'
          ]) {
            if (!serviceWorker.includes(asset)) {
              console.error(`::error file=sw.js::Service worker cache list should include ${asset}`);
              process.exit(1);
            }
          }
          NODE

      - name: Build static package
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist/assets/icons
          cp index.html styles.css app.js manifest.webmanifest sw.js icon.svg README.md dist/
          cp assets/icons/icon-192.png assets/icons/icon-512.png dist/assets/icons/
          touch dist/.nojekyll

      - name: Upload ready app artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisably-android-pwa
          path: dist
          if-no-files-found: error
